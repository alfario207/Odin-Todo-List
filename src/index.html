<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Odibee+Sans&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Quicksand:wght@300..700&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="side-bar">
            <h1>To-do list</h1>
            <div class="project-container">
                <div class="project selected" id="all-task">
                    <img src="./assets/task.svg" alt="all task"/>
                    <p>All Task</p>
                </div>
                <div class="project-title">
                    <img src="./assets/folder.svg" />
                    <h2>Projects</h2>
                </div>
                <div class="project" id="my-projects">
                    <p>My Projects</p>
                </div>
            </div>
            <button class="new-btn" id="new-project">New Project</button>
        </div>
    </div>
</body>
</html>
